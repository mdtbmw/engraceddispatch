name: Build & Test Cross-Platform Apps

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  android-build-test:
    name: Android Build & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Verify Gradle Wrapper & Cache Permissions
        working-directory: mobile
        run: chmod +x gradlew || true

      - name: Run Linter
        working-directory: mobile
        run: ./gradlew lintDebug

      - name: Run Unit & Robolectric Tests
        working-directory: mobile
        run: ./gradlew :app:testDebugUnitTest

      - name: Build Debug APK
        working-directory: mobile
        run: ./gradlew assembleDebug

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: mobile/app/build/outputs/apk/debug/app-debug.apk

  ios-build-test:
    name: iOS Xcode Build Verification
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js for React Native Tools
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install JavaScript Dependencies
        run: |
          npm ci || npm install

      - name: Install CocoaPods Dependencies
        run: |
          cd ios && pod install || true

      - name: Build iOS App for Simulator
        run: |
          xcodebuild -workspace ios/EngracedDispatch.xcworkspace \
            -scheme EngracedDispatch \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath ios/build \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload iOS Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-debug-simulator-app
          path: ios/build/Build/Products/Debug-iphonesimulator/EngracedDispatch.app
